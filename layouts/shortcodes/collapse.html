<!-- layouts/shortcodes/collapse.html -->
{{- $title := .Get "title" | default "Click to expand" -}}
{{- $open := .Get "open" | default false -}}
<details{{ if eq $open "true" }} open{{ end }} style="margin: 1.2em 0; padding: 0.5em 1em; border: 1px solid var(--border, #e0e0e0); border-radius: 8px; background: var(--code-bg, #f8f8f8); transition: all 0.2s ease;">
  <summary style="font-weight: 600; cursor: pointer; font-size: 1.05em; padding: 0.2em 0; color: var(--primary, #0056b3); list-style: none; display: flex; align-items: center; gap: 0.5em;">
    <span style="display: inline-block; transition: transform 0.2s ease;">▶</span>
    {{ $title | markdownify | safeHTML }}
  </summary>
  <div style="padding: 0.5em 0 0 1.5em; border-left: 3px solid var(--primary, #0056b3); margin-top: 0.5em; padding-left: 1em; color: var(--content, #333);">
    {{ .Inner | markdownify }}
  </div>
</details>
